services:
    mongo:
        image: mongo:7
        container_name: battleship-mongo
        ports:
            - "27017:27017"
        volumes:
            - mongo-data:/data/db
        restart: unless-stopped

    mongo-express:
        image: mongo-express
        container_name: battleship-mongo-express
        ports:
            - "8081:8081"
        environment:
            - ME_CONFIG_MONGODB_URL=mongodb://mongo:27017
            - ME_CONFIG_BASICAUTH=false
        depends_on:
            - mongo
        restart: unless-stopped

    server:
        build:
            context: ./server
            dockerfile: Dockerfile
            target: development
        container_name: battleship-server
        ports:
            - "3001:3001"
        environment:
            - MONGODB_URI=mongodb://mongo:27017/battleship
            - PORT=3001
            - NODE_ENV=development
            - LOG_LEVEL=debug
        volumes:
            - ./server/src:/app/src
        depends_on:
            - mongo
        restart: unless-stopped

    client:
        build:
            context: ./client
            dockerfile: Dockerfile
            target: development
        container_name: battleship-client
        ports:
            - "5173:5173"
        environment:
            - VITE_SERVER_URL=http://server:3001
        volumes:
            - ./client/src:/app/src
        depends_on:
            - server
        restart: unless-stopped

volumes:
    mongo-data:
